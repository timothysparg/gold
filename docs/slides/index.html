		<script>
			const revealHighlight = RevealHighlight();
			window.hljs = revealHighlight.hljs;

			function updateDayCounter() {
				const startDateString = "2021-12-20";
				const dayCounter = document.getElementById("the-number-of-days");
				if (dayCounter) {
					const startDate = new Date(startDateString);
					const millisPerDay = 1000 * 60 * 60 * 24;
					const elapsedDays = Math.ceil((Date.now() - startDate.getTime()) / millisPerDay);
					dayCounter.textContent = String(elapsedDays);
				}
			}

			function fitHooksCodeBlocks() {
				document.querySelectorAll('section.hooks-code-slide.present pre').forEach((pre) => {
					const slide = pre.closest('section.hooks-code-slide');
					const code = pre.querySelector('code');
					if (!slide || !code) return;

					const slideBox = slide.parentElement;
					if (!slideBox) return;

					pre.style.fontSize = '';

					let scale = 1;
					const minScale = 0.3;
					const fitsSlide = () => slide.scrollHeight <= slideBox.clientHeight;
					const fitsWidth = () => code.scrollWidth <= code.clientWidth;

					for (let i = 0; i < 32 && (!fitsWidth() || !fitsSlide()) && scale > minScale; i++) {
						scale -= 0.025;
						pre.style.fontSize = `${scale}em`;
					}
				});
			}

			function normalizeLineStep(value) {
				return (value || '').replace(/\s/g, '');
			}

			function updateLineCallouts() {
				const currentSlide = Reveal.getCurrentSlide();
				if (!currentSlide) return;

				const codes = Array.from(currentSlide.querySelectorAll('code[data-line-numbers]'));
				const activeCode =
					codes.find((code) => code.classList.contains('current-fragment')) ||
					codes.find((code) => !code.classList.contains('fragment')) ||
					null;

				const activeLineStep = normalizeLineStep(activeCode?.getAttribute('data-line-numbers'));

				currentSlide.querySelectorAll('[data-line-callout]').forEach((target) => {
					target.hidden = normalizeLineStep(target.dataset.lineCallout) !== activeLineStep;
				});
			}

			function refreshSlideEnhancements() {
				requestAnimationFrame(() => {
					fitHooksCodeBlocks();
					updateLineCallouts();
					requestAnimationFrame(fitHooksCodeBlocks);
				});
				window.setTimeout(() => {
					fitHooksCodeBlocks();
					updateLineCallouts();
				}, 120);
			}
		</script>
		<script src="reveal.js/vendor/highlightjs-pkl/pkl.min.js"></script>
		<script>

			Reveal.initialize({
				controls: true,
				progress: true,
				history: true,
				center: true,
				hash: false,
				pdfSeparateFragments: false,
				showNotes: false,
				pdfMaxPagesPerSlide: 1,
				plugins: [ RevealMarkdown, revealHighlight, RevealNotes ]
			});

			Reveal.on('ready', () => {
				updateDayCounter();
				refreshSlideEnhancements();
			});
			Reveal.on('slidechanged', refreshSlideEnhancements);
			Reveal.on('fragmentshown', refreshSlideEnhancements);
			Reveal.on('fragmenthidden', refreshSlideEnhancements);
			window.addEventListener('resize', refreshSlideEnhancements);
		</script>
