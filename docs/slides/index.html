				color: #172554;
			}

			.reveal .slides .slide-callout--warning {
				border-left-color: #f59e0b;
				background: rgba(245, 158, 11, 0.12);
				color: #3b2f0b;
			}

			.reveal .slides .slide-callout-stack {
				position: relative;
				margin-top: 0.9em;
				min-height: 0;
			}

			.reveal .slides .slide-callout-stack [data-line-callout] {
				margin-top: 0;
			}

			.reveal .slides .slide-callout-stack .slide-callout.fragment {
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				margin-top: 0;
				width: 100%;
				box-sizing: border-box;
			}
		</style>

		<script src="reveal.js/dist/reveal.js"></script>
		<script src="reveal.js/plugin/markdown/markdown.js"></script>
		<script src="reveal.js/plugin/highlight/highlight.js"></script>
		<script src="reveal.js/plugin/notes/notes.js"></script>

		<script>
			const revealHighlight = RevealHighlight();
			window.hljs = revealHighlight.hljs;

			function updateDayCounter() {
				const startDateString = "2021-12-20";
				const dayCounter = document.getElementById("the-number-of-days");
				if (dayCounter) {
					const startDate = new Date(startDateString);
					const millisPerDay = 1000 * 60 * 60 * 24;
					const elapsedDays = Math.ceil((Date.now() - startDate.getTime()) / millisPerDay);
					dayCounter.textContent = String(elapsedDays);
				}
			}

			function fitHooksCodeBlocks() {
				document.querySelectorAll('section.hooks-code-slide.present pre').forEach((pre) => {
					const slide = pre.closest('section.hooks-code-slide');
					const code = pre.querySelector('code');
					if (!slide || !code) return;

					const slideBox = slide.parentElement;
					if (!slideBox) return;

					pre.style.fontSize = '';

					let scale = 1;
					const minScale = 0.3;
					const fitsSlide = () => slide.scrollHeight <= slideBox.clientHeight;
					const fitsWidth = () => code.scrollWidth <= code.clientWidth;

					for (let i = 0; i < 32 && (!fitsWidth() || !fitsSlide()) && scale > minScale; i++) {
						scale -= 0.025;
						pre.style.fontSize = `${scale}em`;
					}
				});
			}

			function normalizeLineStep(value) {
				return (value || '').replace(/\s/g, '');
			}

			function updateLineCallouts() {
				const currentSlide = Reveal.getCurrentSlide();
				if (!currentSlide) return;

				const codes = Array.from(currentSlide.querySelectorAll('code[data-line-numbers]'));
				const activeCode =
					codes.find((code) => code.classList.contains('current-fragment')) ||
					codes.filter((code) => !code.classList.contains('fragment') || code.classList.contains('visible')).at(-1) ||
					null;

				const activeLineStep = normalizeLineStep(activeCode?.getAttribute('data-line-numbers'));

				currentSlide.querySelectorAll('[data-line-callout]').forEach((target) => {
					const matchesLineStep = normalizeLineStep(target.dataset.lineCallout) === activeLineStep;
					const matchesFragmentState =
						!target.classList.contains('fragment') ? true :
						target.classList.contains('current-visible') ?
							target.classList.contains('current-fragment') :
							target.classList.contains('visible') || target.classList.contains('current-fragment');

					target.hidden = !matchesLineStep || !matchesFragmentState;
				});

				currentSlide.querySelectorAll('.slide-callout-stack').forEach((stack) => {
					const activeFragmentCallout = Array.from(stack.querySelectorAll('[data-line-callout].fragment'))
						.some((target) => !target.hidden);
					if (!activeFragmentCallout) return;

					stack.querySelectorAll('[data-line-callout]:not(.fragment)').forEach((target) => {
						target.hidden = true;
					});
				});
			}

			function updateCalloutStackHeights() {
				const currentSlide = Reveal.getCurrentSlide();
				if (!currentSlide) return;

				currentSlide.querySelectorAll('.slide-callout-stack').forEach((stack) => {
					const callouts = Array.from(stack.querySelectorAll('.slide-callout'));
					const relevantCallouts = callouts.filter((callout) => {
						if (callout.hidden) return false;
						if (!callout.classList.contains('fragment')) return true;
						if (callout.classList.contains('current-visible')) {
							return callout.classList.contains('current-fragment');
						}
						return callout.classList.contains('visible') || callout.classList.contains('current-fragment');
					});
					if (!relevantCallouts.length) {
						stack.style.minHeight = '';
						return;
					}

					let maxHeight = 0;
					relevantCallouts.forEach((callout) => {
						const previous = {
							hidden: callout.hidden,
							visibility: callout.style.visibility,
							position: callout.style.position,
							top: callout.style.top,
							left: callout.style.left,
							right: callout.style.right,
							width: callout.style.width,
						};

						callout.hidden = false;
						callout.style.visibility = 'hidden';
						callout.style.position = 'relative';
						callout.style.top = 'auto';
						callout.style.left = 'auto';
						callout.style.right = 'auto';
						callout.style.width = '100%';

						maxHeight = Math.max(maxHeight, callout.getBoundingClientRect().height);

						callout.hidden = previous.hidden;
						callout.style.visibility = previous.visibility;
						callout.style.position = previous.position;
						callout.style.top = previous.top;
						callout.style.left = previous.left;
						callout.style.right = previous.right;
						callout.style.width = previous.width;
					});

					const fontSize = parseFloat(getComputedStyle(stack).fontSize) || 16;
					stack.style.minHeight = maxHeight > 0 ? `${maxHeight / fontSize}em` : '';
				});
			}

			function refreshSlideEnhancements() {
				requestAnimationFrame(() => {
					fitHooksCodeBlocks();
					updateLineCallouts();
					updateCalloutStackHeights();
					requestAnimationFrame(fitHooksCodeBlocks);
				});
				window.setTimeout(() => {
					fitHooksCodeBlocks();
					updateLineCallouts();
					updateCalloutStackHeights();
				}, 120);
			}
		</script>
		<script src="reveal.js/vendor/highlightjs-pkl/pkl.min.js"></script>
		<script>

			Reveal.initialize({
				controls: true,
				progress: true,
				history: true,
				center: true,
				hash: false,
				pdfSeparateFragments: false,
				showNotes: false,
				pdfMaxPagesPerSlide: 1,
				plugins: [ RevealMarkdown, revealHighlight, RevealNotes ]
			});

			Reveal.on('ready', () => {
				updateDayCounter();
				refreshSlideEnhancements();
			});
			Reveal.on('slidechanged', refreshSlideEnhancements);
			Reveal.on('fragmentshown', refreshSlideEnhancements);
			Reveal.on('fragmenthidden', refreshSlideEnhancements);
			window.addEventListener('resize', refreshSlideEnhancements);
		</script>
